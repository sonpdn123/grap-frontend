<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thu Nhap</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <h1>Thu nhập PS</h1>
        
        <div class="calendar-controls">
            <button id="prevMonth">Tháng trước</button>
            <h2 id="monthYearDisplay"></h2>
            <button id="nextMonth">Tháng sau</button>
        </div>

        <div class="calendar-header">
            <div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div><div>CN</div>
        </div>
        
        <div class="calendar-grid" id="calendarGrid"></div>

        <div id="monthlyGrossDisplay" class="monthly-gross"></div>
        
        <details class="expense-select-details">
            <summary>Tùy chọn loại trừ chi phí</summary>
            <div class="expense-checkbox-group">
                <label><input type="checkbox" id="chkGas" checked> Tiền xăng</label>
                <label><input type="checkbox" id="chkFood" checked> Tiền ăn, uống</label>
                <label><input type="checkbox" id="chkHaoMon" checked> Chi phí hao mòn xe</label>
                <label><input type="checkbox" id="chkOther" checked> Chi phí khác</label>
            </div>
        </details>

        <div id="monthlyTotalDisplay" class="monthly-total"></div>
        <div id="monthlyExpenseDisplay" class="monthly-expense"></div>
    </div>

    <div id="dataModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">X</span>
            <h2 id="modalDateTitle"></h2>
            <form id="incomeForm">
                <input type="hidden" id="selectedDate">
                
                <div class="action-buttons">
                    <button type="submit" id="saveBtn">Lưu</button>
                </div>

                <div class="form-group">
                    <label for="grabIncome">Tiền từ app Grab:</label>
                    <input type="number" id="grabIncome" value="0" min="0" readonly>
                </div>
                
                <div class="form-group">
                    <label for="outsideIncome">Tiền từ cuốc ngoài:</label>
                    <input type="number" id="outsideIncome" value="0" min="0" readonly>
                </div>
                
                <div class="form-group">
                    <label for="tipIncome">Tiền được bo:</label>
                    <input type="number" id="tipIncome" value="0" min="0" readonly>
                </div>
                
                <div class="form-group">
                    <label for="gasExpense">Tiền xăng:</label>
                    <input type="number" id="gasExpense" value="0" min="0" readonly>
                </div>
                
                <div class="form-group">
                    <label for="foodExpense">Tiền ăn, uống:</label>
                    <input type="number" id="foodExpense" value="0" min="0" readonly>
                </div>

                <div class="form-group">
                    <label for="haoMonExpense">Chi phí hao mòn xe:</label>
                    <input type="number" id="haoMonExpense" value="0" readonly>
                </div>

                <div class="form-group">
                    <label for="otherExpense">Chi phí khác:</label>
                    <input type="number" id="otherExpense" value="0" readonly>
                </div>
                
                <div class="result-box">
                    <strong>Tổng thu nhập </strong> <span id="dailyTotal">0</span>
                </div>
            </form>
        </div>
    </div>

    <div id="inputActionModal" class="modal action-modal">
        <div class="modal-content action-modal-content">
            <h3 id="inputActionTitle"></h3>
            <input type="number" id="quickInput" placeholder="Nhập số tiền...">
            <div class="action-buttons">
                <button type="button" id="btnChinhSua" class="btn-edit">Chỉnh sửa</button>
                <button type="button" id="btnCongThem" class="btn-add">Cộng thêm</button>
            </div>
            <button type="button" id="closeInputAction" class="btn-cancel">Hủy</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
